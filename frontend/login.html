<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inspector Login - Helideck Inspection Report</title>
  <style>
    :root {
      --accent: #1c6f6b;
      --accent-2: #c6922e;
      --border: #e3e2dd;
      --shadow: 0 10px 30px rgba(20, 20, 20, 0.08);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at 20% 20%, #fef6e8 0%, #f6f5f2 45%, #f2f1ec 100%);
      color: #1a1f2c;
      font-family: "Source Serif Pro", "Iowan Old Style", "Palatino Linotype", "Palatino", serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .auth-container {
      width: 100%;
      max-width: 400px;
      padding: clamp(16px, 4vw, 32px);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .auth-header h1 {
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      margin: 0 0 8px 0;
      color: var(--accent);
      font-weight: 700;
    }

    .auth-header p {
      margin: 0;
      color: #5b6270;
      font-size: clamp(0.85rem, 2vw, 0.95rem);
    }

    .auth-card {
      background: #ffffff;
      border-radius: var(--radius);
      padding: clamp(24px, 6vw, 36px);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .form-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .form-tab {
      flex: 1;
      padding: clamp(12px, 2vw, 16px);
      text-align: center;
      cursor: pointer;
      border: none;
      background: none;
      font-size: clamp(0.9rem, 2vw, 1rem);
      font-weight: 600;
      color: #5b6270;
      transition: all 0.3s ease;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
    }

    .form-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .form-tab:hover {
      color: var(--accent);
    }

    .form-content {
      display: none;
    }

    .form-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: clamp(16px, 3vw, 20px);
    }

    label {
      display: block;
      font-size: clamp(0.85rem, 2vw, 0.95rem);
      font-weight: 500;
      margin-bottom: clamp(6px, 1vw, 8px);
      color: #1a1f2c;
    }

    input {
      width: 100%;
      padding: clamp(10px, 2vw, 12px) clamp(12px, 2vw, 14px);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: clamp(0.9rem, 2vw, 1rem);
      font-family: "Source Sans 3", "Segoe UI", sans-serif;
      background: #fcfcfb;
      transition: all 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(28, 111, 107, 0.1);
      background: #fefefe;
    }

    .button-group {
      display: flex;
      gap: clamp(8px, 2vw, 12px);
      margin-top: clamp(20px, 4vw, 28px);
    }

    button {
      flex: 1;
      padding: clamp(12px, 2vw, 14px);
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: clamp(0.85rem, 1.8vw, 0.95rem);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.02em;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(28, 111, 107, 0.25);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #f0efe9;
      color: #2b2b2b;
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: #e8e6de;
    }

    .message {
      padding: clamp(12px, 2vw, 14px);
      border-radius: 10px;
      margin-bottom: clamp(12px, 2vw, 16px);
      font-size: clamp(0.8rem, 1.8vw, 0.9rem);
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .loading {
      display: none;
      text-align: center;
      font-size: 0.85rem;
      color: #5b6270;
      margin-bottom: 12px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #e3e2dd;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .form-footer {
      text-align: center;
      font-size: clamp(0.8rem, 1.8vw, 0.9rem);
      color: #5b6270;
      margin-top: clamp(16px, 3vw, 20px);
    }

    .form-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .auth-container {
        padding: 12px;
      }

      .auth-card {
        padding: 20px;
      }

      .button-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <!-- Header -->
    <div class="auth-header">
      <h1>Bristow Helicopters</h1>
      <p>Helideck Inspection Report System</p>
    </div>

    <!-- Auth Card -->
    <div class="auth-card">
      <!-- Tabs -->
      <div class="form-tabs">
        <button class="form-tab active" data-tab="login">Login</button>
        <button class="form-tab" data-tab="signup">Sign Up</button>
      </div>

      <!-- Messages -->
      <div id="message" class="message"></div>
      <div id="loading" class="loading">
        <span class="spinner"></span>
        Processing...
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="form-content active">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" name="email" required placeholder="inspector@example.com" />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" name="password" required placeholder="Enter your password" />
        </div>
        <div class="button-group">
          <button type="submit" class="btn-primary">Login</button>
        </div>
      </form>

      <!-- Sign Up Form -->
      <form id="signupForm" class="form-content">
        <div class="form-group">
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" name="name" required placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" name="email" required placeholder="inspector@example.com" />
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" name="password" required placeholder="Create a password" />
        </div>
        <div class="form-group">
          <label for="signupPasswordConfirm">Confirm Password</label>
          <input type="password" id="signupPasswordConfirm" name="password_confirmation" required placeholder="Confirm password" />
        </div>
        <div class="button-group">
          <button type="submit" class="btn-primary">Create Account</button>
        </div>
      </form>

      <div class="form-footer">
        <p id="footerText">Don't have an account? <a href="#" onclick="switchTab('signup'); return false;">Sign up here</a></p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://helideck-production.up.railway.app/api'; // Deployed Railway API
    const DEMO_USER = {
      email: 'inspector@example.com',
      password: 'password',
      name: 'Demo Inspector'
    };
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const messageEl = document.getElementById('message');
    const loadingEl = document.getElementById('loading');
    const tabs = document.querySelectorAll('.form-tab');

    // Tab switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.getAttribute('data-tab');
        switchTab(tabName);
      });
    });

    function switchTab(tabName) {
      document.querySelectorAll('.form-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-content').forEach(c => c.classList.remove('active'));

      document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
      document.querySelector(`#${tabName}Form`).classList.add('active');

      messageEl.classList.remove('show', 'success', 'error');
      messageEl.textContent = '';
    }

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = `message show ${type}`;
      loadingEl.classList.remove('show');
    }

    function showLoading() {
      loadingEl.classList.add('show');
      messageEl.classList.remove('show');
    }

    function enterDemoMode() {
      localStorage.setItem('auth_token', 'demo-token');
      localStorage.setItem('auth_user', JSON.stringify({
        id: 1,
        name: DEMO_USER.name,
        email: DEMO_USER.email,
        role: 'inspector'
      }));

      showMessage('Demo login successful! Redirecting...', 'success');

      setTimeout(() => {
        window.location.href = '/index.html';
      }, 500);
    }

    // Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      showLoading();

      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const password = document.getElementById('loginPassword').value;

      if (email === DEMO_USER.email && password === DEMO_USER.password) {
        enterDemoMode();
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Login failed');
        }

        // Store token
        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('auth_user', JSON.stringify(data.user));

        showMessage('Login successful! Redirecting...', 'success');

        // Redirect to form
        setTimeout(() => {
          window.location.href = '/index.html';
        }, 1000);
      } catch (error) {
        showMessage(`${error.message}. Use inspector@example.com / password for demo access.`, 'error');
      }
    });

    // Sign Up
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      showLoading();

      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const passwordConfirm = document.getElementById('signupPasswordConfirm').value;

      if (password !== passwordConfirm) {
        showMessage('Passwords do not match', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, password_confirmation: passwordConfirm })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Registration failed');
        }

        showMessage('Account created! Logging you in...', 'success');

        // Auto login after signup
        setTimeout(() => {
          document.getElementById('loginEmail').value = email;
          document.getElementById('loginPassword').value = password;
          loginForm.dispatchEvent(new Event('submit'));
        }, 1000);
      } catch (error) {
        showMessage(error.message, 'error');
      }
    });

    // Check if already logged in
    if (localStorage.getItem('auth_token')) {
      window.location.href = '/index.html';
    }
  </script>
</body>
</html>
